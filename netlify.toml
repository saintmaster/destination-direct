    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.cartocdn.com https://cartodb-basemaps-a.global.ssl.fastly.net https://cartodb-basemaps-b.global.ssl.fastly.net https://cartodb-basemaps-c.global.ssl.fastly.net https://cartodb-basemaps-d.global.ssl.fastly.net; connect-src 'self' https://nms.aim.faa.gov https://tracks.ganderoceanic.ca https://ganderoceanic.ca https://www.notams.faa.gov https://raw.githubusercontent.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://api-nms.aim.faa.gov https://api.jsonbin.io https://tessdata.projectnaptha.com; worker-src 'self' blob: https://cdn.jsdelivr.net; font-src 'self' data:"
